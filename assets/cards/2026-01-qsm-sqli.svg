<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300" font-family="'Fira Code','Consolas',monospace">
  <defs>
    <linearGradient id="n" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00FF99"/><stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <radialGradient id="g" cx="30%" cy="22%" r="70%">
      <stop offset="0%" stop-color="#00FF99" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#00FF99" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="card"><rect x="4" y="4" width="292" height="292" rx="18"/></clipPath>
  </defs>
  <rect x="4" y="4" width="292" height="292" rx="18" fill="#0b1320" stroke="#1d3a52" stroke-width="1.5"/>
  <rect x="4" y="4" width="292" height="292" rx="18" fill="url(#g)"/>
  <!-- scanline -->
  <g clip-path="url(#card)">
    <rect x="4" width="292" height="2" y="10" fill="#00FF99" opacity="0.25">
      <animate attributeName="y" values="6;290;6" dur="4.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" keyTimes="0;0.5;1"/>
    </rect>
  </g>
  <!-- traveling neon border light -->
  <rect x="4" y="4" width="292" height="292" rx="18" fill="none" stroke="url(#n)" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="170 967">
    <animate attributeName="stroke-dashoffset" values="0;-1137" dur="4s" repeatCount="indefinite"/>
  </rect>
  <!-- type badge -->
  <rect x="22" y="24" width="88" height="22" rx="11" fill="#00FF99" fill-opacity="0.14" stroke="#00FF99" stroke-opacity="0.6"/>
  <circle cx="35" cy="35" r="3.5" fill="#00FF99">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <text x="46" y="39" font-size="11.5" font-weight="700" letter-spacing="1" fill="#00FF99">RESEARCH</text>
  <!-- title -->
  <text x="22" y="104" font-size="17" font-weight="600" fill="#e9eef3">CVE-2025-9318:</text><text x="22" y="129" font-size="17" font-weight="600" fill="#e9eef3">Authenticated SQL</text><text x="22" y="154" font-size="17" font-weight="600" fill="#e9eef3">Injection in QSM</text>
  <!-- meta -->
  <text x="22" y="232" font-size="12.5" fill="#5b7186">2026-01-20 · 7 min</text>
  <!-- tags -->
  <g transform="translate(22 250)"><rect width="51" height="20" rx="10" fill="#161f2e" stroke="#00FF99" stroke-opacity="0.4"/><text x="26" y="14" font-size="11" fill="#00FF99" text-anchor="middle">#sqli</text></g><g transform="translate(81 250)"><rect width="86" height="20" rx="10" fill="#161f2e" stroke="#00FF99" stroke-opacity="0.4"/><text x="43" y="14" font-size="11" fill="#00FF99" text-anchor="middle">#wordpress</text></g><g transform="translate(175 250)"><rect width="44" height="20" rx="10" fill="#161f2e" stroke="#00FF99" stroke-opacity="0.4"/><text x="22" y="14" font-size="11" fill="#00FF99" text-anchor="middle">#cve</text></g>
  <!-- corner prompt -->
  <text x="266" y="282" font-size="13" fill="#00FF99" opacity="0.5">&gt;_</text>
</svg>
