<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 300" width="320" height="300" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="hoodie" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f2a3a"/>
      <stop offset="100%" stop-color="#111a27"/>
    </linearGradient>
    <linearGradient id="bubble" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00FF99"/>
      <stop offset="100%" stop-color="#00c2ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00FF99" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00FF99" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- soft glow -->
  <circle cx="160" cy="150" r="140" fill="url(#glow)"/>

  <!-- gentle floating for the whole character -->
  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="translate"
      values="0 0; 0 -6; 0 0" dur="3s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.45 0 0.55 1; 0.45 0 0.55 1" keyTimes="0;0.5;1"/>

    <!-- speech bubble: Hi! -->
    <g>
      <rect x="196" y="40" rx="14" ry="14" width="84" height="48" fill="url(#bubble)"/>
      <path d="M210 86 L210 104 L228 86 Z" fill="#00c2ff"/>
      <text x="238" y="71" font-size="26" font-weight="700" fill="#06121f" text-anchor="middle">Hi!</text>
      <animate attributeName="opacity" values="0;1;1;1;0.85;1" dur="3s" repeatCount="indefinite"/>
    </g>

    <!-- body / hoodie -->
    <path d="M96 300 L96 196 Q96 156 136 150 L184 150 Q224 156 224 196 L224 300 Z" fill="url(#hoodie)"/>
    <!-- hood collar -->
    <path d="M128 156 Q160 188 192 156 L192 150 L128 150 Z" fill="#0c1320"/>
    <!-- drawstrings -->
    <line x1="150" y1="170" x2="150" y2="214" stroke="#00FF99" stroke-width="3" stroke-linecap="round"/>
    <line x1="170" y1="170" x2="170" y2="208" stroke="#00FF99" stroke-width="3" stroke-linecap="round"/>
    <circle cx="150" cy="216" r="3.5" fill="#00FF99"/>
    <circle cx="170" cy="210" r="3.5" fill="#00FF99"/>
    <!-- chest accent -->
    <rect x="146" y="232" width="48" height="10" rx="5" fill="#00FF99" opacity="0.85"/>

    <!-- static arm (left) -->
    <path d="M210 188 q26 18 20 60" stroke="#16202e" stroke-width="26" fill="none" stroke-linecap="round"/>
    <circle cx="228" cy="250" r="14" fill="#f0c08a"/>

    <!-- neck -->
    <rect x="146" y="120" width="28" height="26" rx="8" fill="#e6b07c"/>

    <!-- head -->
    <circle cx="160" cy="96" r="42" fill="#f0c08a"/>
    <!-- hair -->
    <path d="M118 92 Q116 50 160 50 Q204 50 202 92 Q188 70 160 70 Q132 70 118 92 Z" fill="#26221f"/>
    <path d="M118 92 Q120 78 130 70 L130 96 Q123 96 118 92 Z" fill="#26221f"/>
    <!-- eyes -->
    <circle cx="146" cy="98" r="4.5" fill="#1a1a1a"/>
    <circle cx="176" cy="98" r="4.5" fill="#1a1a1a"/>
    <!-- blink -->
    <rect x="140" y="92" width="13" height="11" rx="3" fill="#f0c08a">
      <animate attributeName="height" values="0;0;11;0;0" keyTimes="0;0.45;0.5;0.55;1" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="y" values="92;92;92;92;92" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="170" y="92" width="13" height="11" rx="3" fill="#f0c08a">
      <animate attributeName="height" values="0;0;11;0;0" keyTimes="0;0.45;0.5;0.55;1" dur="4s" repeatCount="indefinite"/>
    </rect>
    <!-- smile -->
    <path d="M148 112 Q160 124 172 112" stroke="#b3623a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- cheeks -->
    <circle cx="138" cy="110" r="5" fill="#ff9d8a" opacity="0.45"/>
    <circle cx="182" cy="110" r="5" fill="#ff9d8a" opacity="0.45"/>

    <!-- WAVING ARM (right) — pivots at shoulder (110,186) -->
    <g>
      <animateTransform attributeName="transform" attributeType="XML" type="rotate"
        values="-6 110 186; 26 110 186; -6 110 186" dur="0.9s" repeatCount="indefinite"
        calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" keyTimes="0;0.5;1"/>
      <!-- sleeve -->
      <path d="M110 186 Q86 140 92 96" stroke="url(#hoodie)" stroke-width="28" fill="none" stroke-linecap="round"/>
      <!-- cuff accent -->
      <circle cx="92" cy="100" r="15" fill="#16202e"/>
      <!-- waving hand -->
      <g>
        <circle cx="90" cy="82" r="16" fill="#f0c08a"/>
        <!-- fingers -->
        <rect x="80" y="58" width="6" height="20" rx="3" fill="#f0c08a"/>
        <rect x="88" y="55" width="6" height="23" rx="3" fill="#f0c08a"/>
        <rect x="96" y="58" width="6" height="20" rx="3" fill="#f0c08a"/>
        <rect x="103" y="64" width="6" height="16" rx="3" fill="#f0c08a"/>
        <!-- thumb -->
        <rect x="72" y="74" width="6" height="14" rx="3" fill="#f0c08a" transform="rotate(-35 75 81)"/>
      </g>
    </g>
  </g>
</svg>
