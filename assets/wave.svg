<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 320" width="380" height="320" font-family="'Fira Code', 'Consolas', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="55%" stop-color="#0a1320"/>
      <stop offset="100%" stop-color="#06101a"/>
    </linearGradient>
    <linearGradient id="hood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#13233a"/>
      <stop offset="100%" stop-color="#0a1626"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00FF99"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <radialGradient id="aura" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#00FF99" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#00d4ff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00FF99" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5"/>
    </filter>
    <filter id="softblur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect x="6" y="6" width="368" height="308" rx="26" fill="url(#bg)" stroke="#1d3a52" stroke-width="1.5"/>
  <!-- subtle grid -->
  <g stroke="#163a55" stroke-width="1" opacity="0.35">
    <line x1="6" y1="70" x2="374" y2="70"/>
    <line x1="6" y1="134" x2="374" y2="134"/>
    <line x1="6" y1="198" x2="374" y2="198"/>
    <line x1="6" y1="262" x2="374" y2="262"/>
    <line x1="70" y1="6" x2="70" y2="314"/>
    <line x1="134" y1="6" x2="134" y2="314"/>
    <line x1="198" y1="6" x2="198" y2="314"/>
    <line x1="262" y1="6" x2="262" y2="314"/>
    <line x1="326" y1="6" x2="326" y2="314"/>
  </g>

  <!-- pulsing aura -->
  <circle cx="190" cy="150" r="120" fill="url(#aura)">
    <animate attributeName="r" values="112;128;112" dur="3.4s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" keyTimes="0;0.5;1"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3.4s" repeatCount="indefinite"/>
  </circle>

  <!-- floating binary particles -->
  <g fill="#00FF99" font-size="13" font-weight="600" opacity="0.0">
    <text x="70" y="250">1<animate attributeName="y" values="270;70" dur="5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.8;0" dur="5s" repeatCount="indefinite"/></text>
    <text x="300" y="250">0<animate attributeName="y" values="280;80" dur="6s" begin="-1.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.7;0" dur="6s" begin="-1.5s" repeatCount="indefinite"/></text>
    <text x="110" y="250" fill="#00d4ff">0<animate attributeName="y" values="290;90" dur="6.6s" begin="-3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.6;0" dur="6.6s" begin="-3s" repeatCount="indefinite"/></text>
    <text x="330" y="250" fill="#00d4ff">1<animate attributeName="y" values="275;75" dur="5.4s" begin="-2.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.7;0" dur="5.4s" begin="-2.2s" repeatCount="indefinite"/></text>
    <text x="48" y="250">0<animate attributeName="y" values="285;95" dur="7s" begin="-4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.5;0" dur="7s" begin="-4s" repeatCount="indefinite"/></text>
  </g>

  <!-- character group: gentle float -->
  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="translate" values="0 0;0 -7;0 0" dur="3.4s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" keyTimes="0;0.5;1"/>

    <!-- body / hoodie torso -->
    <path d="M120 320 L120 214 Q120 176 160 170 L220 170 Q260 176 260 214 L260 320 Z" fill="url(#hood)" stroke="#1f3e59" stroke-width="1.5"/>
    <!-- zipper -->
    <line x1="190" y1="178" x2="190" y2="320" stroke="#0a1626" stroke-width="4"/>
    <line x1="190" y1="186" x2="190" y2="300" stroke="url(#neon)" stroke-width="1.6" opacity="0.7"/>
    <!-- chest emblem: </> -->
    <text x="190" y="246" font-size="22" font-weight="700" fill="#00FF99" text-anchor="middle" opacity="0.9">&lt;/&gt;
      <animate attributeName="opacity" values="0.55;1;0.55" dur="2s" repeatCount="indefinite"/>
    </text>

    <!-- static arm (left side) -->
    <path d="M246 206 q34 22 26 78" stroke="url(#hood)" stroke-width="30" fill="none" stroke-linecap="round"/>
    <path d="M246 206 q34 22 26 78" stroke="#1f3e59" stroke-width="31" fill="none" stroke-linecap="round" opacity="0.0"/>
    <circle cx="272" cy="286" r="15" fill="#0e1d30" stroke="url(#neon)" stroke-width="1.2"/>

    <!-- HOOD around head -->
    <path d="M132 120 Q132 56 190 56 Q248 56 248 120 Q248 150 224 160 L156 160 Q132 150 132 120 Z" fill="url(#hood)" stroke="url(#neon)" stroke-width="1.6"/>
    <!-- inner hood shadow / face void -->
    <path d="M150 116 Q150 74 190 74 Q230 74 230 116 Q230 142 210 150 L170 150 Q150 142 150 116 Z" fill="#05101c"/>

    <!-- glowing eyes -->
    <g>
      <ellipse cx="174" cy="116" rx="11" ry="6" fill="#00FF99" filter="url(#blur)" opacity="0.85"/>
      <ellipse cx="206" cy="116" rx="11" ry="6" fill="#00FF99" filter="url(#blur)" opacity="0.85"/>
      <ellipse cx="174" cy="116" rx="6.5" ry="3.4" fill="#d9fff1"/>
      <ellipse cx="206" cy="116" rx="6.5" ry="3.4" fill="#d9fff1"/>
      <animate attributeName="opacity" values="1;1;0.25;1;1" keyTimes="0;0.46;0.5;0.54;1" dur="4.5s" repeatCount="indefinite"/>
    </g>

    <!-- WAVING ARM (right), pivots at shoulder (134,210) -->
    <g>
      <animateTransform attributeName="transform" attributeType="XML" type="rotate" values="-8 134 210; 30 134 210; -8 134 210" dur="0.85s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" keyTimes="0;0.5;1"/>
      <!-- sleeve -->
      <path d="M134 210 Q104 156 112 104" stroke="url(#hood)" stroke-width="30" fill="none" stroke-linecap="round"/>
      <!-- neon cuff -->
      <circle cx="113" cy="108" r="16" fill="#0e1d30" stroke="url(#neon)" stroke-width="2"/>
      <!-- hand -->
      <g>
        <circle cx="110" cy="90" r="16" fill="#0e1d30" stroke="url(#neon)" stroke-width="1.6"/>
        <rect x="100" y="64" width="6" height="22" rx="3" fill="#163a55"/>
        <rect x="108" y="60" width="6" height="26" rx="3" fill="#163a55"/>
        <rect x="116" y="64" width="6" height="22" rx="3" fill="#163a55"/>
        <rect x="123" y="70" width="6" height="17" rx="3" fill="#163a55"/>
        <rect x="92" y="80" width="6" height="15" rx="3" fill="#163a55" transform="rotate(-35 95 87)"/>
      </g>
    </g>
  </g>

  <!-- terminal caption -->
  <g font-size="13" font-weight="600">
    <text x="30" y="300" fill="#00FF99">&gt;_</text>
    <text x="52" y="300" fill="#7fe9c4">hello,&#160;world</text>
    <rect x="146" y="290" width="9" height="13" fill="#00FF99">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
